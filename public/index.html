<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>学术关键词翻译扩增助手</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="bg-orbs" aria-hidden="true">
    <span class="orb orb-1"></span>
    <span class="orb orb-2"></span>
    <span class="orb orb-3"></span>
    <span class="orb orb-4"></span>
  </div>
  <div class="bg-grid" aria-hidden="true"></div>

  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <div class="logo-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2a10 10 0 0 0-10 10c0 1.9.5 3.6 1.4 5.2L2 22l4.8-1.4A10 10 0 1 0 12 2z"/>
              <path d="M8 12h.01M12 12h.01M16 12h.01"/>
            </svg>
          </div>
          <div class="logo-text">
            <span class="logo-title">学术关键词助手</span>
            <span class="logo-sub">翻译 · 扩增 · 检索</span>
          </div>
        </div>
        <button class="icon-btn sidebar-toggle" id="sidebarToggle" title="收起侧边栏" aria-label="收起侧边栏">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
      </div>

      <button class="new-chat-btn" id="newChatBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
        <span>新建查询</span>
      </button>

      <div class="conversations" id="conversations">
        <div class="conversations-label">历史对话</div>
        <div class="conversation-list" id="conversationList">
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            <p>暂无历史对话</p>
          </div>
        </div>
      </div>

      <div class="sidebar-footer">
        <div class="footer-info">
          <div class="status-dot"></div>
          <span>在线 · 流式响应</span>
        </div>
      </div>
    </aside>

    <main class="main" id="main">
      <header class="main-header">
        <button class="icon-btn menu-btn" id="menuBtn" title="展开侧边栏" aria-label="展开侧边栏">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
        </button>
        <div class="header-title">
          <h1 id="chatTitle">学术关键词翻译扩增</h1>
          <span class="header-sub" id="chatSub">输入关键词开始扩增</span>
        </div>
        <div class="header-actions">
          <button class="icon-btn" id="clearBtn" title="清空当前查询" aria-label="清空当前查询">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
          </button>
        </div>
      </header>

      <div class="messages" id="messages">
        <div class="welcome" id="welcome">
          <div class="welcome-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
              <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
            </svg>
          </div>
          <h2>学术关键词翻译扩增助手</h2>
          <p>输入中英文学术检索关键词，自动翻译并扩增同义术语，适配知网、WOS、IEEE 等学术数据库检索。</p>
          <div class="suggestions" id="suggestions">
            <button class="suggestion-card" data-prompt="锂电池">
              <div class="suggestion-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="16" height="10" rx="2"/><line x1="22" y1="11" x2="22" y2="13"/><line x1="6" y1="11" x2="6" y2="13"/><line x1="10" y1="11" x2="10" y2="13"/></svg>
              </div>
              <div class="suggestion-content">
                <span class="suggestion-title">中文 → 英文</span>
                <span class="suggestion-desc">锂电池 关键词扩增</span>
              </div>
            </button>
            <button class="suggestion-card" data-prompt="machine learning">
              <div class="suggestion-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
              </div>
              <div class="suggestion-content">
                <span class="suggestion-title">英文 → 中文</span>
                <span class="suggestion-desc">machine learning 关键词扩增</span>
              </div>
            </button>
            <button class="suggestion-card" data-prompt="深度学习">
              <div class="suggestion-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
              </div>
              <div class="suggestion-content">
                <span class="suggestion-title">中文 → 英文</span>
                <span class="suggestion-desc">深度学习 关键词扩增</span>
              </div>
            </button>
            <button class="suggestion-card" data-prompt="natural language processing">
              <div class="suggestion-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
              </div>
              <div class="suggestion-content">
                <span class="suggestion-title">英文 → 中文</span>
                <span class="suggestion-desc">NLP 关键词扩增</span>
              </div>
            </button>
          </div>
        </div>
      </div>

      <div class="input-area">
        <div class="input-wrapper">
          <div class="input-box" id="inputBox">
            <textarea
              id="messageInput"
              class="message-input"
              placeholder="输入学术检索关键词，如：锂电池、machine learning…按 Enter 执行"
              rows="1"
              autocomplete="off"
            ></textarea>
            <button class="send-btn" id="sendBtn" title="发送" aria-label="发送消息" disabled>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
          </div>
          <div class="input-hint">
            <span>支持中英文学术关键词翻译扩增 · 适配知网 / WOS / IEEE 等数据库</span>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Mobile overlay -->
  <div class="overlay" id="overlay"></div>

  <!-- Toast container -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/common.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
